<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anting - Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f8f9fa;
        color: #2c2420;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 1.25rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Anda sedang offline</h1>
        <p>Halaman ini tidak bisa dimuat sekarang. Coba lagi saat koneksi internet tersedia.</p>
      </section>
    </main>
  </body>
</html>
